# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools
#
# Builds the Jekyll site, then deploys the generated _site/ to Firebase Hosting.
# (_site is gitignored, so it MUST be built here before the deploy step.)

name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true   # pulls the assets/lib chirpy-static-assets submodule
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll b -d _site
        env:
          JEKYLL_ENV: production

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PERSONAL_WEBSITE_8D4DD }}'
          channelId: live
          projectId: personal-website-8d4dd
